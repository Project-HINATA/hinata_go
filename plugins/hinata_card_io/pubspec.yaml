name: hinata_card_io
description: Shared HINATA reader and phone NFC transport package.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ^3.11.0
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  convert: ^3.1.2
  flutter_nfc_kit: ^3.6.0
  web: ^1.1.0
  neo_web_usb:
    git:
      url: "https://github.com/nerimoe/neo_web_usb.dart"
  neo_web_hid:
    git:
      url: "https://github.com/nerimoe/neo_web_hid.dart"
  quick_usb:
    path: ../quick_usb/

dev_dependencies:
  flutter_lints: ^6.0.0
