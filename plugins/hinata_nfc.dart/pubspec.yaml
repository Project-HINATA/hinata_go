name: hinata_nfc
description: Bottom-level NFC and USB HID device/card communication library for hinata_go.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.11.0
  flutter: ">=3.11.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_nfc_kit: ^3.6.0
  convert: ^3.1.2
  web: ^1.1.0
  neo_web_hid:
    git:
      url: "https://github.com/nerimoe/neo_web_hid.dart"
  quick_usb:
    path: ../quick_usb/
