name: Flutter Android Build & Auto Release

on:
  push:
    branches: ["main"]

jobs:
  build:
    name: Build and Auto Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LOCAL_PLUGINS_REPO: ${{ secrets.LOCAL_PLUGINS_REPO }}
      LOCAL_PLUGINS_TOKEN: ${{ secrets.LOCAL_PLUGINS_TOKEN }}
      LOCAL_PLUGINS_REF: ${{ secrets.LOCAL_PLUGINS_REF }}
      CARDCIPHER_REPO: ${{ secrets.CARDCIPHER_REPO }}
      CARDCIPHER_TOKEN: ${{ secrets.CARDCIPHER_TOKEN }}
      CARDCIPHER_REF: ${{ secrets.CARDCIPHER_REF }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Setup private plugins
        if: ${{ env.LOCAL_PLUGINS_REPO != '' || env.CARDCIPHER_REPO != '' }}
        shell: bash
        run: ./.github/scripts/setup_private_plugins.sh

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build APK
        run: flutter build apk --split-debug-info=build/symbols --obfuscate --split-per-abi --release
        env:
          ANDROID_KEYSTORE_PATH: "release.keystore"
          ANDROID_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Version Check & Generate Changelog
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/generate_release_metadata.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.mode_title }}
          prerelease: ${{ steps.meta.outputs.is_prerelease == 'true' }}
          body: |
            ${{ steps.meta.outputs.changelog }}

            ---
            **Build Info**: `${{ github.sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
